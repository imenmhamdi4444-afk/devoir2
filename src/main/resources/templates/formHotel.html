<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<link rel="stylesheet" type="text/css"
      href="webjars/bootstrap/4.3.1/css/bootstrap.min.css" />
<head>
    <meta charset="utf-8">
    <title>Hotel Form</title>
</head>
<body>
<div th:replace="template"></div>
<div class="container mt-5">
    <div class="card">
        <div class="card-header" th:if="${mode=='new'}">Ajout des Hotels</div>
        <div class="card-header" th:if="${mode=='edit'}">Modification des Hotels</div>
        <div class="card-body">
            <form th:action="@{saveHotel}" method="post" th:object="${hotel}">
                <div class="form-group">
                    <label hidden>ID :</label>
                    <input type="hidden" name="idHotel"
                           th:value="${hotel.idHotel}" />
                </div>
                <div class="form-group">
                    <label class="control-label">Nom Hotel :</label>
                    <input type="text" name="nomHotel" class="form-control"
                           th:value="${hotel.nomHotel}" />
                    <span th:errors="${hotel.nomHotel}" class="text-danger"></span>
                </div>
                <div class="form-group">
                    <label class="control-label">Ville :</label>
                    <input type="text" name="ville" class="form-control"
                           th:value="${hotel.ville}" />
                    <span th:errors="${hotel.ville}" class="text-danger"></span>
                </div>
                <div class="form-group">
                    <label class="control-label">Prix Nuit :</label>
                    <input type="text" name="prixNuit" class="form-control"
                           th:value="${hotel.prixNuit}" />
                    <span th:errors="${hotel.prixNuit}" class="text-danger"></span>
                </div>
                <div class="form-group">
                    <label class="control-label">Etoiles :</label>
                    <input type="text" name="etoiles" class="form-control"
                           th:value="${hotel.etoiles}" />
                    <span th:errors="${hotel.etoiles}" class="text-danger"></span>
                </div>
				<div class="form-group">
				    <label class="control-label">Type Hotel :</label>
				    
				    <!-- Mode edit avec typeHotel déjà assigné -->
				    <select name="typeHotel" class="form-control"
				            th:if="${mode=='edit' and !#strings.isEmpty(hotel.typeHotel)}">
				        <option th:each="t:${types}"
				                th:value="${t.idType}"
				                th:text="${t.nomType}"
				                th:selected="${t.idType == hotel.typeHotel.idType}">
				        </option>
				    </select>

				    <!-- Mode new ou hotel sans typeHotel -->
				    <select name="typeHotel" class="form-control"
				            th:if="${mode=='new' or #strings.isEmpty(hotel.typeHotel)}">
				        <option th:each="t:${types}"
				                th:value="${t.idType}"
				                th:text="${t.nomType}">
				        </option>
				    </select>
				</div>
                <div>
                    <button type="submit" class="btn btn-primary">Valider</button>
                </div>
				<input type="hidden" name="page" th:value="${page}" />
				<input type="hidden" name="size" th:value="${size}" />
            </form>
        </div>
    </div>
</div>
</body>
</html>
