<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<link rel="stylesheet" type="text/css"
      href="webjars/bootstrap/4.3.1/css/bootstrap.min.css" />
<head>
    <meta charset="utf-8">
    <title>Liste des Hotels</title>
</head>
<body>
<div th:replace="template"></div>
<div class="container">
    <div class="card">
        <div class="card-header">
            Liste des Hotels
        </div>
        <div class="card-body">
            <table class="table table-striped">
                <tr>
                    <th>ID</th><th>Nom Hotel</th><th>Ville</th><th>Prix Nuit</th><th>Etoiles</th><th>Action</th>
                </tr>
                <tr th:each="h:${hotels.content}">
                    <td th:text="${h.idHotel}"></td>
                    <td th:text="${h.nomHotel}"></td>
                    <td th:text="${h.ville}"></td>
                    <td th:text="${h.prixNuit}"></td>
                    <td th:text="${h.etoiles}"></td>
                    <td><a class="btn btn-danger"
                           onclick="return confirm('Etes-vous sûr ?')"
                           th:href="@{supprimerHotel(id=${h.idHotel},
                           page=${currentPage},size=${size})}">Supprimer</a></td>
                </tr>
            </table>
            <ul class="nav nav-pills">
                <li th:each="page,status:${pages}">
                    <a th:class="${status.index==currentPage?'btn btn-primary':'btn'}"
                       th:href="@{ListeHotels(page=${status.index}, size=${size})}"
                       th:text="${status.index}"></a>
                </li>
            </ul>
        </div>
    </div>
</div>
</body>
</html>
